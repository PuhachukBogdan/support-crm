# Local development orchestration (spec 003-local-infra, US1).
#
# `docker compose up` brings up one Postgres engine (a DB + isolated role per data-owning
# service, created by deploy/local/postgres/init) and one Redis, then the six backend
# services. Only the gateway is exposed to the host (single ingress, US4). The Next.js web
# app runs via `npm run dev:web` (not containerised until Phase 8). Local dev only —
# production is Kubernetes (Phase 13). Secrets come from .env (git-ignored); there are NO
# defaults baked in (FR-005). See deploy/local/README.md for the port map.

name: crm

x-service-base: &service-base
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
      # Per-service role passwords consumed by the init script (no hardcoded creds).
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:?set AUTH_DB_PASSWORD in .env}
      USERS_DB_PASSWORD: ${USERS_DB_PASSWORD:?set USERS_DB_PASSWORD in .env}
      CHATS_DB_PASSWORD: ${CHATS_DB_PASSWORD:?set CHATS_DB_PASSWORD in .env}
      BRANDS_DB_PASSWORD: ${BRANDS_DB_PASSWORD:?set BRANDS_DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/local/postgres/init:/docker-entrypoint-initdb.d:ro
    # Optional host bind for a local DB client; comment out to keep Postgres internal-only.
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    <<: *service-base
    build:
      context: .
      dockerfile: deploy/docker/gateway.Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GATEWAY_PORT: ${GATEWAY_PORT:-3000}
      REDIS_URL: redis://redis:6379
      AUTH_GRPC_TARGET: auth:50051
      USERS_GRPC_TARGET: users:50052
      CHATS_GRPC_TARGET: chats:50053
      BRANDS_GRPC_TARGET: brands:50054
      WORKER_GRPC_TARGET: worker:50055
    # Single host-exposed ingress: REST + WebSocket on one port (US4 / FR-009).
    ports:
      - '${GATEWAY_PORT:-3000}:3000'

  auth:
    <<: *service-base
    build: { context: ., dockerfile: deploy/docker/auth.Dockerfile }
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GRPC_URL: 0.0.0.0:50051
      DATABASE_URL: postgresql://auth_user:${AUTH_DB_PASSWORD:?}@postgres:5432/auth_db

  users:
    <<: *service-base
    build: { context: ., dockerfile: deploy/docker/users.Dockerfile }
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GRPC_URL: 0.0.0.0:50052
      DATABASE_URL: postgresql://users_user:${USERS_DB_PASSWORD:?}@postgres:5432/users_db

  chats:
    <<: *service-base
    build: { context: ., dockerfile: deploy/docker/chats.Dockerfile }
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GRPC_URL: 0.0.0.0:50053
      DATABASE_URL: postgresql://chats_user:${CHATS_DB_PASSWORD:?}@postgres:5432/chats_db

  brands:
    <<: *service-base
    build: { context: ., dockerfile: deploy/docker/brands.Dockerfile }
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GRPC_URL: 0.0.0.0:50054
      DATABASE_URL: postgresql://brands_user:${BRANDS_DB_PASSWORD:?}@postgres:5432/brands_db

  worker:
    <<: *service-base
    build: { context: ., dockerfile: deploy/docker/worker.Dockerfile }
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      GRPC_URL: 0.0.0.0:50055
      REDIS_URL: redis://redis:6379

volumes:
  pgdata:
